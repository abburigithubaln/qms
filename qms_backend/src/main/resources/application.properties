spring.application.name=queue

# ── Database ──────────────────────────────────────────────────────────────────
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/queue_system}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:1441}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2

# ── JPA ───────────────────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ── JWT ───────────────────────────────────────────────────────────────────────
jwt.secret=${JWT_SECRET:dev_only_secret_minimum_32_chars_long_change_in_prod}
jwt.expiration-ms=86400000

# ── Server ────────────────────────────────────────────────────────────────────
server.port=${PORT:8080}

# ── App ───────────────────────────────────────────────────────────────────────
app.token-prefix=HYD
app.avg-interview-minutes=20
app.frontend-url=${FRONTEND_URL:http://localhost:5173}

# ── Mail — Brevo SMTP Relay ───────────────────────────────────────────────────
# IMPORTANT: spring.mail.username must be the SMTP user Brevo gave you (a98b5c001@smtp-brevo.com).
#            The FROM address in emails is set separately below (app.mail.from).
#            The FROM address must be a verified sender in your Brevo account.
spring.mail.host=${MAIL_HOST:smtp-relay.brevo.com}
spring.mail.port=${MAIL_PORT:465}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.ssl.enable=true
spring.mail.properties.mail.smtp.starttls.enable=false
spring.mail.properties.mail.smtp.starttls.required=false
spring.mail.properties.mail.smtp.connectiontimeout=15000
spring.mail.properties.mail.smtp.timeout=15000
spring.mail.properties.mail.smtp.writetimeout=15000
spring.mail.default-encoding=UTF-8

# From address — must match a verified sender/domain in your Brevo account
app.mail.from=lakshminarayana@arahinfotech.net
app.mail.from-name=QMS Interview System
